<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator Munaqosyah FEBI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #1f2937;
    }

    .header-container {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      color: #1e3a8a;
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    h2 {
      color: #60a5fa;
      margin-top: 5px;
      font-weight: 600;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .calculator-card {
      background: #ffffff;
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      width: 100%;
      max-width: 420px;
      box-sizing: border-box;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      font-weight: 600;
      color: #4b5563;
      display: block;
      margin-bottom: 10px;
      font-size: 14px;
    }

    input[type="number"] {
      width: 100%;
      padding: 15px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 18px;
      box-sizing: border-box;
      outline: none;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
    }

    input[type="number"]:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    .button-group {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background-color: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background-color: #1d4ed8;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }

    .btn-secondary {
      background-color: #f3f4f6;
      color: #4b5563;
      flex: 0.4;
    }

    .btn-secondary:hover {
      background-color: #e5e7eb;
    }

    .result-box {
      margin-top: 30px;
      padding: 25px;
      border-radius: 16px;
      background-color: #f8fafc;
      display: none;
      border: 1px solid #e2e8f0;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .grade-badge-container {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .grade-badge {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 700;
      color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .result-details {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .result-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 15px;
      color: #64748b;
      padding-bottom: 8px;
      border-bottom: 1px dashed #cbd5e1;
    }

    .result-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .result-value {
      font-weight: 700;
      font-size: 16px;
    }

    .status-lulus { color: #059669; }
    .status-gagal { color: #dc2626; }
    
    .bg-lulus { background: linear-gradient(135deg, #10b981, #059669); }
    .bg-gagal { background: linear-gradient(135deg, #ef4444, #dc2626); }

    .footer {
      margin-top: 40px;
      color: #9ca3af;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="header-container">
    <h1>Kalkulator Munaqosyah</h1>
    <h2>FEBI UINSI Samarinda</h2>
  </div>
  
  <div class="calculator-card">
    <div class="form-group">
      <label for="inputNilai">Masukkan Nilai Akhir (0 - 100)</label>
      <input type="number" id="inputNilai" placeholder="Contoh: 85.5" step="0.01" min="0" max="100">
    </div>
    
    <div class="button-group">
      <button class="btn btn-primary" onclick="hitungKonversi()">Hitung Hasil</button>
      <button class="btn btn-secondary" onclick="resetForm()">Reset</button>
    </div>

    <div class="result-box" id="hasilBox">
      <div class="grade-badge-container">
        <div class="grade-badge" id="badgeHuruf">A</div>
      </div>
      
      <div class="result-details">
        <div class="result-item">
          <span>Bobot Angka</span> 
          <span class="result-value" id="outAngka" style="color: #0f172a;">-</span>
        </div>
        <div class="result-item">
          <span>Status</span> 
          <span class="result-value" id="outKategori">-</span>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    &copy; 2026 FEBI UINSI
  </div>

  <script>
    // Fitur agar bisa menekan "Enter" pada keyboard
    document.getElementById("inputNilai").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        hitungKonversi();
      }
    });

    function hitungKonversi() {
      const inputVal = document.getElementById('inputNilai').value;
      const hasilBox = document.getElementById('hasilBox');
      const badgeHuruf = document.getElementById('badgeHuruf');
      const elKategori = document.getElementById('outKategori');
      
      if(inputVal === '') {
        alert('Mohon masukkan nilai terlebih dahulu!');
        document.getElementById('inputNilai').focus();
        return;
      }

      const nilai = parseFloat(inputVal);
      
      if (nilai < 0 || nilai > 100) {
        alert('Nilai tidak valid! Masukkan angka antara 0 hingga 100.');
        document.getElementById('inputNilai').value = '';
        document.getElementById('inputNilai').focus();
        return;
      }

      let huruf = '';
      let angka = '';
      let kategori = '';

      // Logika Penilaian
      if (nilai >= 90 && nilai <= 100) {
        huruf = 'A'; angka = '4.00'; kategori = 'Lulus';
      } else if (nilai >= 86 && nilai < 90) {
        huruf = 'A-'; angka = '3.75'; kategori = 'Lulus';
      } else if (nilai >= 80 && nilai < 86) {
        huruf = 'B+'; angka = '3.50'; kategori = 'Lulus';
      } else if (nilai >= 76 && nilai < 80) {
        huruf = 'B'; angka = '3.00'; kategori = 'Lulus';
      } else if (nilai >= 70 && nilai < 76) {
        huruf = 'B-'; angka = '2.75'; kategori = 'Lulus';
      } else if (nilai >= 66 && nilai < 70) {
        huruf = 'C+'; angka = '2.50'; kategori = 'Lulus';
      } else if (nilai >= 60 && nilai < 66) {
        huruf = 'C'; angka = '2.00'; kategori = 'Lulus';
      } else if (nilai >= 50 && nilai < 60) {
        huruf = 'D'; angka = '1.00'; kategori = 'Tidak Lulus';
      } else if (nilai >= 0 && nilai < 50) {
        huruf = 'E'; angka = '0.00'; kategori = 'Tidak Lulus';
      }

      // Update Teks
      badgeHuruf.innerText = huruf;
      document.getElementById('outAngka').innerText = angka;
      elKategori.innerText = kategori;
      
      // Update Warna Badge dan Teks Status
      if(kategori === 'Lulus') {
        badgeHuruf.className = 'grade-badge bg-lulus';
        elKategori.className = 'result-value status-lulus';
      } else {
        badgeHuruf.className = 'grade-badge bg-gagal';
        elKategori.className = 'result-value status-gagal';
      }

      // Tampilkan hasil
      hasilBox.style.display = 'block';
    }

    function resetForm() {
      document.getElementById('inputNilai').value = '';
      document.getElementById('hasilBox').style.display = 'none';
      document.getElementById('inputNilai').focus();
    }
  </script>
</body>
</html>
